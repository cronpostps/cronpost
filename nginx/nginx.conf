worker_processes auto;

events {
    worker_connections 768;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name localhost; # Hoặc tên miền của bạn sau này

        root /usr/share/nginx/html;
        index index.html index.htm;

        # Phục vụ các file tĩnh cho frontend
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Reverse proxy cho Backend Python API
        # Tất cả các yêu cầu tới /api/... sẽ được chuyển đến backend_python
        location /api {
            proxy_pass http://backend_python:8000; # "backend_python" là tên service trong docker-compose.yml
                                                 # "8000" là cổng mà FastAPI/Uvicorn đang chạy bên trong container backend
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Reverse proxy cho n8n
        # Tất cả các yêu cầu tới /n8n/... sẽ được chuyển đến n8n_service
        location /n8n/ {
            proxy_pass http://n8n_service:5678/; # "n8n_service" là tên service, "5678" là cổng của n8n
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade"; # Cần thiết cho WebSocket của n8n
            proxy_buffering off; # Tắt buffering để cải thiện hiệu suất cho các kết nối dài của n8n
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}