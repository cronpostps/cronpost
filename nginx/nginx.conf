worker_processes auto; # Tự động điều chỉnh số lượng worker process

events {
    worker_connections 768; # Số kết nối tối đa cho mỗi worker
}

http {
    include       /etc/nginx/mime.types; # Bao gồm các kiểu MIME mặc định
    default_type  application/octet-stream;

    # Cài đặt log
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    sendfile        on; # Cho phép sendfile để tăng tốc độ gửi file tĩnh
    #tcp_nopush     on;

    keepalive_timeout  65; # Thời gian giữ kết nối

    #gzip  on; # Có thể bật nén gzip để giảm kích thước truyền tải

    # Định nghĩa server block cho website CronPost
    server {
        listen 80; # Lắng nghe ở cổng 80 (cổng này trong container, đã được map ra cổng 80 hoặc 8080 của host)
        server_name localhost; # Hoặc tên miền của bạn sau này

        # Thư mục gốc chứa các file của website
        root /usr/share/nginx/html;
        index index.html index.htm; # File mặc định khi truy cập thư mục

        # Cấu hình cho các file tĩnh
        location / {
            try_files $uri $uri/ /index.html; # Thử tìm file/thư mục, nếu không thấy thì trả về index.html (quan trọng cho Single Page Application sau này nếu có)
        }

        # (Sau này sẽ thêm vào đây)
        # Cấu hình reverse proxy cho backend Python
        # location /api {
        #     proxy_pass http://backend_python:8000; # Giả sử backend chạy ở cổng 8000
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }

        # (Sau này sẽ thêm vào đây)
        # Cấu hình reverse proxy cho n8n
        # location /n8n/ {
        #     proxy_pass http://n8n_service:5678/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection "Upgrade";
        # }

        # Tùy chỉnh trang lỗi (tùy chọn)
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}