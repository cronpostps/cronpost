# docker-compose.yml
# Version: 2.2
# Mô tả: Cấu hình lại một số cảnh báo N8N, xóa comment.

services:
  frontend_nginx:
    image: nginx:alpine
    container_name: cronpost_nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend_python
    networks:
      - cronpost_network

  backend_python:
    build:
      context: ./backend
      dockerfile: Dockerfile_backend
    container_name: cronpost_backend
    volumes:
      - ./backend/app:/code/app
    env_file:
      - ./.env
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - cronpost_network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: cronpost_postgres
    ports:
      - "5432:5432"
    env_file:
      - ./.env
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db_init:/docker-entrypoint-initdb.d
    networks:
      - cronpost_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  n8n_service:
    image: n8nio/n8n
    container_name: cronpost_n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    env_file:
      - ./.env
    environment:
      - GENERIC_TIMEZONE=UTC
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=https://n8n.cronpost.com/
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_HOST=n8n.cronpost.com
      - N8N_SECURE_COOKIE=true
      - N8N_TRUST_PROXY=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
    networks:
      - cronpost_network
    depends_on:
      db:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cronpost_cloudflared_main
    restart: unless-stopped
    command: tunnel --config /home/nonroot/.cloudflared/config.yml run
    volumes:
      - ./.cloudflared:/home/nonroot/.cloudflared
    networks:
      - cronpost_network
    depends_on:
      - frontend_nginx

networks:
  cronpost_network:
    driver: bridge

volumes:
  db_data:
  n8n_data: